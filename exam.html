<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Exam Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="exam-body">
<header class="exam-header">
    <div class="exam-user">
        <img id="examPic" alt="Profile Picture" style="width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid #fff;">
        <div>
            <h4 id="examFirstname"></h4>
            <p id="examMatric"></p>
        </div>
    </div>
    <div class="timer-box">⏱️ <span id="timer">12:00</span></div>
</header>

<main class="exam-container">
    <div id="questionBox" class="question-card"></div>
    <div class="nav-buttons">
        <button id="prevBtn" onclick="prevQ()">⬅️ Previous</button>
        <button id="nextBtn" onclick="nextQ()">Next ➡️</button>
    </div>
    <div id="qNav" class="q-nav"></div>
    <button class="submit-btn" onclick="submitExam()">✅ Submit & Finish</button>
</main>

<script src="exam.js"></script>
</body>
</html>
